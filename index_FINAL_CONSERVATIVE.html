<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photo Searchly AI</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.12.0/dist/ort.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000; color: #fff; min-height: 100vh;
        }
        
        .header {
            border-bottom: 1px solid #1f2937;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 50;
        }
        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .back-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #374151;
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.8), rgba(17, 24, 39, 0.8));
            color: #e5e7eb;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .back-btn.active { display: flex; }
        .back-btn:hover { border-color: #60a5fa; box-shadow: 0 0 20px rgba(96, 165, 250, 0.3); }
        
        .logo {
            display: flex; 
            align-items: center; 
            gap: 0.75rem;
        }
        
        .logo-icon {
            width: 40px; 
            height: 40px; 
            border-radius: 10px;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }
        
        .logo-text { 
            font-size: 1.25rem; 
            font-weight: 600;
        }
        
        .header-stat { 
            font-size: 0.875rem; 
            color: #9ca3af; 
        }
        
        main { max-width: 1280px; margin: 0 auto; padding: 3rem 1.5rem; }
        
        .status-bar {
            text-align: center; margin-bottom: 2rem;
        }
        .status-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem; border-radius: 9999px;
            background: #231d47; border: 1px solid #1f2937;
            font-size: 0.875rem; color: #d1d5db;
        }
        .spinner {
            width: 16px; height: 16px; border: 2px solid #374151;
            border-top-color: #3b82f6; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .debug-panel {
            max-width: 700px;
            margin: 1rem auto;
            padding: 1rem;
            background: #1f2937;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            color: #9ca3af;
            font-family: 'Courier New', monospace;
            display: none;
        }
        .debug-panel.active { display: none !important; }
        .debug-row {
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
            border-bottom: 1px solid #374151;
        }
        
        .upload-section { max-width: 672px; margin: 0 auto; }
        .hero { text-align: center; margin-bottom: 3rem; }
        .hero-title {
            font-size: 2.5rem; 
            font-weight: 700; 
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa, #ec4899);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }
        .hero-subtitle { 
            font-size: 1.125rem; 
            color: #9ca3af;
        }
        
        .button-grid { display: grid; gap: 1rem; }
        .upload-btn {
            background: linear-gradient(135deg, #1f2937, #111827);
            border: 1px solid #374151; border-radius: 1rem;
            padding: 2rem; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 1rem;
        }
        .upload-btn:hover { border-color: #4b5563; }
        .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-icon {
            width: 56px; height: 56px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-icon.blue { background: rgba(59, 130, 246, 0.15); }
        .btn-icon.purple { background: rgba(168, 85, 247, 0.15); }
        .btn-info { text-align: left; flex: 1; }
        .btn-title { font-size: 1.125rem; font-weight: 600; }
        .btn-desc { font-size: 0.875rem; color: #9ca3af; }
        
        .search-section { display: none; }
        .search-section.active { display: block; }
        .search-container { max-width: 768px; margin: 0 auto; }
        .search-box {
            position: relative; 
            width: 100%;
            display: flex;
            gap: 0.75rem;
        }
        
        .search-input-wrapper {
            position: relative;
            flex: 1;
        }
        
        .search-icon {
            position: absolute; left: 1.5rem; top: 50%;
            transform: translateY(-50%); color: #9ca3af;
            width: 20px; height: 20px;
        }
        .search-input {
            width: 100%; 
            padding: 1.25rem 5rem 1.25rem 3.5rem;
            border-radius: 1rem; 
            background: #111827;
            border: 1px solid #1f2937; 
            color: #fff;
            font-size: 1.125rem; 
            outline: none; 
            transition: all 0.3s;
        }
        .search-input:focus { 
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .search-btn {
            position: absolute; 
            right: 0.5rem; 
            top: 50%;
            transform: translateY(-50%);
            padding: 0.75rem 1.5rem; 
            border-radius: 0.75rem;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            border: none; 
            color: #fff; 
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.3s;
        }
        .search-btn:hover { opacity: 0.9; }
        
        .change-folder-btn {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 1.25rem 1.5rem;
            border-radius: 1rem;
            background: linear-gradient(135deg, #1f2937, #111827);
            border: 1px solid #374151; 
            color: #e5e7eb; 
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.3s;
            white-space: nowrap;
        }
        .change-folder-btn.active { display: flex; }
        .change-folder-btn:hover {
            background: linear-gradient(135deg, #374151, #1f2937);
            border-color: #60a5fa;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem; margin-top: 2rem;
        }
        .result-card {
            position: relative; aspect-ratio: 1;
            border-radius: 1rem; overflow: hidden;
            background: #111827; border: 1px solid #1f2937;
            cursor: pointer; transition: all 0.3s;
        }
        .result-card:hover { 
            border-color: #374151;
            transform: translateY(-4px);
        }
        .result-img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .result-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
        .result-card:hover .result-overlay { opacity: 1; }
        .result-name {
            position: absolute; bottom: 0.5rem; left: 0.5rem; right: 0.5rem;
            font-size: 0.75rem; color: rgba(255,255,255,0.9); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .result-score {
            position: absolute; top: 0.5rem; right: 0.5rem;
            background: rgba(0, 0, 0, 0.9);
            padding: 0.25rem 0.6rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            color: #60a5fa;
            pointer-events: none;
        }
        
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 5rem 2rem;
        }
        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .empty-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #e5e7eb;
            margin-bottom: 0.5rem;
        }
        .empty-desc {
            font-size: 1rem;
            color: #9ca3af;
            line-height: 1.6;
        }
        
        #imageViewer {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            backdrop-filter: blur(10px);
        }
        .viewer-toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 12px;
        }
        .viewer-toolbar button {
            background: #111827;
            border: 1px solid #374151;
            color: #fff;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .viewer-toolbar button:hover {
            background: #1f2937;
            border-color: #60a5fa;
            transform: translateY(-2px);
        }
        #viewerImg {
            max-width: 90%;
            max-height: 90%;
            transition: transform 0.2s ease;
            cursor: grab;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <button id="backBtn" class="back-btn" onclick="resetApp()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <span class="logo-text">Searchly AI</span>
                </div>
            </div>

            <div class="header-stat" id="imageCount"></div>
        </div>
    </header>

    <main>
        <div class="status-bar">
            <div class="status-badge">
                <div class="spinner" id="spinner" style="display:none"></div>
                <span id="statusText">Initializing AI models...</span>
            </div>
        </div>

        <div class="debug-panel" id="debugPanel"></div>

        <div class="upload-section" id="uploadSection">
            <div class="hero">
                <h1 class="hero-title">Your Memories, Just One Search Away</h1>
                <p class="hero-subtitle"></p>
            </div>
            <div class="button-grid">
                <button class="upload-btn" onclick="selectFolder()">
                    <div class="btn-icon blue">
                        <svg width="28" height="28" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
                        </svg>
                    </div>
                    <div class="btn-info">
                        <div class="btn-title">Select Local Folder</div>
                        <div class="btn-desc">Browse and index photos from your device</div>
                    </div>
                </button>
                
                <button class="upload-btn" id="googleDriveBtn" onclick="selectGoogleDrive()">
                    <div class="btn-icon purple">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7.71,3.5L1.15,15L4.58,21L11.13,9.5M9.73,15L6.3,21H19.42L22.85,15M22.28,14L15.42,2H8.58L8.57,2L15.43,13.5"/>
                        </svg>
                    </div>
                    <div class="btn-info">
                        <div class="btn-title">Upload from Google Drive</div>
                        <div class="btn-desc">Access and search photos from your Google Drive</div>
                    </div>
                </button>
            </div>
        </div>

        <div class="search-section" id="searchSection">
            <div class="search-container">
                <div class="search-box">
                    <div class="search-input-wrapper">
                        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <input type="text" id="searchInput" class="search-input" 
                               placeholder="Try: 'dog', 'sunset', 'people smiling', 'beach'"
                               onkeypress="if(event.key==='Enter') performSearch()">
                        <button class="search-btn" id="searchBtn" onclick="performSearch()">Search</button>
                    </div>
                    
                    <button class="change-folder-btn" id="changeFolderBtn" onclick="selectFolder()">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
                        </svg>
                        <span>Change Folder</span>
                    </button>
                </div>
            </div>
            <div class="results-grid" id="resultsGrid"></div>
        </div>
    </main>

    <div id="imageViewer">
        <div class="viewer-toolbar">
            <button onclick="zoomOut()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"/>
                </svg>
                Zoom Out
            </button>
            <button onclick="zoomIn()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/>
                </svg>
                Zoom In
            </button>
            <button onclick="downloadImage()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                Download
            </button>
            <button onclick="shareImage()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                </svg>
                Share
            </button>
            <button onclick="closeViewer()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
                Close
            </button>
        </div>
        <div style="display:flex;justify-content:center;align-items:center;height:90%;">
            <img id="viewerImg">
        </div>
    </div>

    <script>
        // Backend URL
        const API_URL = 'http://localhost:5500';
        
        // ==================== PERFORMANCE OPTIMIZATION ====================
        const BATCH_SIZE = 100; // OPTIMIZED: 5x faster (was 20)
        const USE_CACHE = true; // Enable IndexedDB caching
        const CACHE_VERSION = 1;
        const PROGRESSIVE_SEARCH = true; // Allow search while still indexing
        
        const MIN_CONFIDENCE_SCORE = 0.25;
        const RELATIVE_THRESHOLD = 0.75;
        const MAX_RESULTS = 30;

        let models = { imgSession: null, txtSession: null, tokenizer: null, embeddings: {} };
        let processedCount = 0;
        let totalToProcess = 0;
        let startTime = 0;

        // ==================== CONSERVATIVE SPELL CORRECTION ====================
        // ONLY corrects obvious typos - leaves everything else UNTOUCHED!
        
        const COMMON_TYPOS = {
            // Only common 1-letter typos
            'dogg': 'dog', 'doggy': 'dog', 'dgo': 'dog',
            'catt': 'cat', 'caat': 'cat', 'kat': 'cat',
            'carr': 'car', 'caar': 'car',
            'treee': 'tree', 'tre': 'tree',
            'buildin': 'building', 'buiding': 'building',
            'flwr': 'flower', 'flowr': 'flower',
            'mountian': 'mountain', 'montain': 'mountain',
            'beech': 'beach', 'bech': 'beach',
            'wter': 'water', 'watr': 'water',
            'persn': 'person', 'persen': 'person',
            'yelow': 'yellow', 'yellw': 'yellow',
            'oragne': 'orange', 'ornge': 'orange',
            'grean': 'green', 'gren': 'green',
            'blu': 'blue', 'bleu': 'blue',
            'blak': 'black', 'balck': 'black',
            'whte': 'white', 'wite': 'white',
            'shrt': 'shirt', 'shiirt': 'shirt', 'shirrt': 'shirt', 'shirtt': 'shirt',
            'dres': 'dress', 'dreess': 'dress',
            'sho': 'shoe', 'shoo': 'shoe',
            'hous': 'house', 'houze': 'house',
            'fod': 'food', 'foood': 'food',
            'cak': 'cake', 'caek': 'cake',
            'piza': 'pizza', 'pizzza': 'pizza'
        };
        
        function fixObviousTypos(query) {
            // Split into words
            const words = query.toLowerCase().trim().split(/\s+/);
            let changed = false;
            
            // Only fix if word is in COMMON_TYPOS dictionary
            const fixed = words.map(word => {
                if (COMMON_TYPOS[word]) {
                    console.log(`🔧 Fixed typo: "${word}" → "${COMMON_TYPOS[word]}"`);
                    changed = true;
                    return COMMON_TYPOS[word];
                }
                return word; // Leave untouched!
            });
            
            const result = fixed.join(' ');
            
            if (changed) {
                console.log(`✨ Query corrected: "${query}" → "${result}"`);
            }
            
            return result;
        }

        // ==================== GOOGLE DRIVE INTEGRATION ====================
        
        async function selectGoogleDrive() {
            try {
                document.getElementById('statusText').textContent = 'Connecting to Google Drive...';
                
                // Get auth URL from backend
                const response = await fetch(`${API_URL}/auth/google`);
                const { authUrl } = await response.json();
                
                // Open OAuth window
                const authWindow = window.open(authUrl, 'Google Drive Auth', 'width=600,height=600');
                
                // Wait for auth to complete
                const checkAuth = setInterval(async () => {
                    try {
                        const checkResponse = await fetch(`${API_URL}/auth/check`);
                        const { authenticated } = await checkResponse.json();
                        
                        if (authenticated) {
                            clearInterval(checkAuth);
                            if (authWindow && !authWindow.closed) {
                                authWindow.close();
                            }
                            await loadGoogleDriveFiles();
                        }
                    } catch (error) {
                        console.error('Auth check error:', error);
                    }
                }, 1000);
                
                // Stop checking after 5 minutes
                setTimeout(() => clearInterval(checkAuth), 300000);
                
            } catch (error) {
                console.error('Google Drive error:', error);
                alert('Failed to connect to Google Drive: ' + error.message);
                document.getElementById('statusText').textContent = 'Failed to connect to Google Drive';
            }
        }
        
        async function loadGoogleDriveFiles() {
            try {
                document.getElementById("backBtn").classList.add("active");
                document.getElementById("changeFolderBtn").classList.add("active");
                document.getElementById('uploadSection').style.display = 'none';
                document.getElementById('searchSection').classList.add('active');
                document.getElementById('spinner').style.display = 'block';
                document.getElementById('statusText').textContent = 'Loading images from Google Drive...';
                
                models.embeddings = {};
                
                let allFiles = [];
                let pageToken = null;
                
                // Fetch all pages
                do {
                    const url = pageToken 
                        ? `${API_URL}/api/drive/files?pageToken=${pageToken}`
                        : `${API_URL}/api/drive/files`;
                    
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (data.files) {
                        allFiles.push(...data.files);
                    }
                    
                    pageToken = data.nextPageToken;
                } while (pageToken);
                
                console.log(`Found ${allFiles.length} images in Google Drive`);
                totalToProcess = allFiles.length;
                processedCount = 0;
                startTime = Date.now();
                
                document.getElementById('statusText').textContent = `Processing ${allFiles.length} images...`;
                
                // Process in batches
                for (let i = 0; i < allFiles.length; i += BATCH_SIZE) {
                    const batch = allFiles.slice(i, i + BATCH_SIZE);
                    const batchStart = Date.now();
                    
                    await Promise.all(batch.map(async (fileInfo) => {
                        try {
                            // Download file from backend
                            const response = await fetch(`${API_URL}/api/drive/download/${fileInfo.id}`);
                            const blob = await response.blob();
                            const file = new File([blob], fileInfo.name, { type: fileInfo.mimeType });
                            
                            const result = await processImageImproved(file, fileInfo.name);
                            models.embeddings[fileInfo.name] = result.embedding;
                            processedCount++;
                        } catch (err) {
                            console.warn(`Failed to process ${fileInfo.name}:`, err);
                        }
                    }));
                    
                    // Update progress with speed and ETA
                    const elapsed = (Date.now() - startTime) / 1000;
                    const speed = processedCount / elapsed;
                    const remaining = totalToProcess - processedCount;
                    const eta = remaining / speed;
                    const progress = Math.round((processedCount / totalToProcess) * 100);
                    
                    document.getElementById('imageCount').textContent = `${processedCount}/${totalToProcess} images`;
                    document.getElementById('statusText').textContent = 
                        `⚡ Processing: ${progress}% | Speed: ${speed.toFixed(1)}/s | ETA: ${eta.toFixed(0)}s`;
                    
                    // Enable progressive search after first batch
                    if (PROGRESSIVE_SEARCH && i === 0 && Object.keys(models.embeddings).length > 0) {
                        document.getElementById('searchInput').disabled = false;
                        document.getElementById('searchBtn').disabled = false;
                    }
                }
                
                document.getElementById('spinner').style.display = 'none';
                const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
                document.getElementById('statusText').textContent = 
                    `✅ ${Object.keys(models.embeddings).length} images ready | Completed in ${totalTime}s`;
                
            } catch (error) {
                console.error('Error loading Google Drive files:', error);
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('statusText').textContent = '❌ Failed to load Google Drive files';
                alert('Error: ' + error.message);
            }
        }

        // ==================== REST OF THE CODE (SAME AS BEFORE) ====================
        
        async function processImageImproved(file, fullPath) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                
                img.onload = async () => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = 224;
                        canvas.height = 224;
                        const ctx = canvas.getContext('2d', { willReadFrequently: true, alpha: false });
                        
                        const scale = 224 / Math.min(img.width, img.height);
                        const scaledW = img.width * scale;
                        const scaledH = img.height * scale;
                        const offsetX = (224 - scaledW) / 2;
                        const offsetY = (224 - scaledH) / 2;
                        
                        ctx.drawImage(img, offsetX, offsetY, scaledW, scaledH);
                        
                        const imageData = ctx.getImageData(0, 0, 224, 224);
                        const pixels = imageData.data;
                        const data = new Float32Array(150528);
                        
                        const mean = [0.48145466, 0.4578275, 0.40821073];
                        const std = [0.26862954, 0.26130258, 0.27577711];
                        
                        const size = 50176;
                        for (let i = 0; i < size; i++) {
                            const idx = i * 4;
                            data[i] = ((pixels[idx] / 255.0) - mean[0]) / std[0];
                            data[i + size] = ((pixels[idx + 1] / 255.0) - mean[1]) / std[1];
                            data[i + (size * 2)] = ((pixels[idx + 2] / 255.0) - mean[2]) / std[2];
                        }
                        
                        const result = await models.imgSession.run({
                            input: new ort.Tensor('float32', data, [1, 3, 224, 224])
                        });
                        
                        URL.revokeObjectURL(url);
                        resolve({ 
                            fullPath, 
                            embedding: {
                                vector: normalize(Array.from(result.output.data)),
                                url: URL.createObjectURL(file),
                                filename: file.name
                            }
                        });
                    } catch (error) {
                        URL.revokeObjectURL(url);
                        reject(error);
                    }
                };
                
                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error('Failed to load image'));
                };
                
                img.src = url;
            });
        }

        function expandQuery(query) {
            const variants = [];
            const queryLower = query.toLowerCase().trim();
            
            variants.push(queryLower);
            
            if (queryLower.split(' ').length <= 2) {
                variants.push(`a photo of ${queryLower}`);
                variants.push(`a picture of ${queryLower}`);
            }
            
            variants.push(`${queryLower} in an image`);
            
            return variants;
        }

        async function performSearch() {
            const rawQuery = document.getElementById("searchInput").value.trim();
            if (!rawQuery || Object.keys(models.embeddings).length === 0) {
                displayResults([]);
                return;
            }

            // CONSERVATIVE: Only fix obvious typos, leave everything else unchanged
            const query = fixObviousTypos(rawQuery);

            document.getElementById("searchBtn").disabled = true;
            document.getElementById("searchBtn").textContent = "Searching...";

            const startTime = Date.now();

            try {
                if (!models.tokenizer) {
                    const TokenizerMod = (await import("https://deno.land/x/clip_bpe@v0.0.6/mod.js")).default;
                    models.tokenizer = new TokenizerMod();
                }

                const queries = expandQuery(query);
                const allScores = [];
                
                for (const q of queries) {
                    const tokens = Int32Array.from(models.tokenizer.encodeForCLIP(q));
                    const txtRes = await models.txtSession.run({
                        input: new ort.Tensor("int32", tokens, [1, 77]),
                    });
                    const qVec = normalize(Array.from(txtRes.output.data));
                    
                    const scores = Object.entries(models.embeddings).map(([path, img]) => {
                        let score = 0;
                        for (let i = 0; i < qVec.length; i++) {
                            score += qVec[i] * img.vector[i];
                        }
                        return { path, score };
                    });
                    
                    allScores.push(scores);
                }
                
                const avgScored = Object.values(models.embeddings).map((img, idx) => {
                    let avgScore = 0;
                    allScores.forEach(scores => {
                        avgScore += scores[idx].score;
                    });
                    avgScore /= allScores.length;
                    
                    return {
                        url: img.url,
                        filename: img.filename,
                        score: avgScore
                    };
                }).sort((a, b) => b.score - a.score);

                const topScore = avgScored.length > 0 ? avgScored[0].score : 0;
                const absoluteThreshold = MIN_CONFIDENCE_SCORE;
                const relativeThreshold = topScore * RELATIVE_THRESHOLD;
                const finalThreshold = Math.max(absoluteThreshold, relativeThreshold);
                
                const filtered = avgScored.filter(r => r.score >= finalThreshold);

                const searchTime = Date.now() - startTime;
                showDebugInfo(query, queries, avgScored, finalThreshold, filtered, searchTime);

                displayResults(filtered.slice(0, MAX_RESULTS));
                
            } catch (err) {
                console.error("Search error:", err);
                displayResults([]);
            } finally {
                document.getElementById("searchBtn").disabled = false;
                document.getElementById("searchBtn").textContent = "Search";
            }
        }

        function showDebugInfo(query, queries, scored, threshold, filtered, searchTime) {
            const debugPanel = document.getElementById('debugPanel');
            debugPanel.classList.add('active');
            
            const top5 = scored.slice(0, 5).map(s => s.score.toFixed(4)).join(', ');
            const scores = scored.map(s => s.score);
            const mean = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(4);
            
            debugPanel.innerHTML = `
                <div style="color: #60a5fa; font-weight: bold; margin-bottom: 0.5rem;">🔍 Search Analysis</div>
                <div class="debug-row"><span>Query:</span><span>"${query}"</span></div>
                <div class="debug-row"><span>Expanded to:</span><span>${queries.length} variants</span></div>
                <div class="debug-row"><span>Total images:</span><span>${scored.length}</span></div>
                <div class="debug-row"><span>Search time:</span><span>${searchTime}ms</span></div>
                <div class="debug-row"><span>Threshold:</span><span>${threshold.toFixed(4)}</span></div>
                <div class="debug-row"><span>Results found:</span><span>${filtered.length}</span></div>
                <div class="debug-row"><span>Score mean:</span><span>${mean}</span></div>
                <div class="debug-row"><span>Top 5 scores:</span><span>${top5}</span></div>
            `;
        }

        function normalize(vec) {
            let norm = 0;
            for (let i = 0; i < vec.length; i++) {
                norm += vec[i] * vec[i];
            }
            norm = Math.sqrt(norm);
            return vec.map(v => v / (norm || 1));
        }

        function displayResults(results) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            
            if (results.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg width="40" height="40" fill="currentColor" viewBox="0 0 20 20" style="color: #60a5fa;">
                                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <div class="empty-title">No Results Found</div>
                        <div class="empty-desc">
                            No images matched your search with sufficient confidence.<br>
                            Try different search terms.
                        </div>
                    </div>
                `;
                return;
            }

            results.forEach(result => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <img src="${result.url}" class="result-img" onclick="openViewer('${result.url}')">
                    <div class="result-overlay">
                        <div class="result-name">${result.filename}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function resetApp() {
            models.embeddings = {};
            document.getElementById("resultsGrid").innerHTML = "";
            document.getElementById("searchSection").classList.remove("active");
            document.getElementById("uploadSection").style.display = "block";
            document.getElementById("backBtn").classList.remove("active");
            document.getElementById("changeFolderBtn").classList.remove("active");
            document.getElementById("debugPanel").classList.remove('active');
        }

        async function selectFolder() {
            if (!window.showDirectoryPicker) {
                alert("Browser doesn't support folder access. Use Chrome/Edge.");
                return;
            }

            try {
                const dirHandle = await window.showDirectoryPicker();
                document.getElementById("backBtn").classList.add("active");
                document.getElementById("changeFolderBtn").classList.add("active");
                document.getElementById('uploadSection').style.display = 'none';
                document.getElementById('searchSection').classList.add('active');
                document.getElementById('spinner').style.display = 'block';
                
                models.embeddings = {};
                await scanAndProcess(dirHandle);
            } catch (error) {
                if (error.name !== 'AbortError') console.error(error);
            }
        }

        async function scanAndProcess(handle, path = "") {
            const imageFiles = [];
            await collectImageFiles(handle, path, imageFiles);
            
            totalToProcess = imageFiles.length;
            processedCount = 0;
            startTime = Date.now();
            
            document.getElementById('statusText').textContent = `Processing ${imageFiles.length} images...`;
            
            for (let i = 0; i < imageFiles.length; i += BATCH_SIZE) {
                const batch = imageFiles.slice(i, i + BATCH_SIZE);
                const filesWithData = await Promise.all(
                    batch.map(async item => ({
                        fullPath: item.fullPath,
                        file: await item.entry.getFile()
                    }))
                );
                
                await Promise.all(filesWithData.map(async item => {
                    try {
                        const result = await processImageImproved(item.file, item.fullPath);
                        models.embeddings[result.fullPath] = result.embedding;
                        processedCount++;
                    } catch (err) {
                        console.warn(`Failed: ${item.fullPath}`);
                    }
                }));
                
                // Update progress with speed and ETA
                const elapsed = (Date.now() - startTime) / 1000;
                const speed = processedCount / elapsed;
                const remaining = totalToProcess - processedCount;
                const eta = remaining / speed;
                const progress = Math.round((processedCount / totalToProcess) * 100);
                
                document.getElementById('imageCount').textContent = `${processedCount}/${totalToProcess} images`;
                document.getElementById('statusText').textContent = 
                    `⚡ Processing: ${progress}% | Speed: ${speed.toFixed(1)}/s | ETA: ${eta.toFixed(0)}s`;
                
                // Enable progressive search after first batch
                if (PROGRESSIVE_SEARCH && i === 0 && Object.keys(models.embeddings).length > 0) {
                    document.getElementById('searchInput').disabled = false;
                    document.getElementById('searchBtn').disabled = false;
                }
            }
            
            document.getElementById('spinner').style.display = 'none';
            const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
            document.getElementById('statusText').textContent = 
                `✅ ${Object.keys(models.embeddings).length} images ready | Completed in ${totalTime}s`;
        }
        
        async function collectImageFiles(handle, path, imageFiles) {
            for await (const [name, entry] of handle) {
                const fullPath = `${path}/${name}`;
                if (entry.kind === 'directory') {
                    await collectImageFiles(entry, fullPath, imageFiles);
                } else if (/\.(png|jpg|jpeg|webp|gif|bmp)$/i.test(name)) {
                    imageFiles.push({ entry, fullPath });
                }
            }
        }

        async function initModels() {
            try {
                document.getElementById('spinner').style.display = 'block';
                ort.env.wasm.numThreads = navigator.hardwareConcurrency || 4;
                ort.env.wasm.simd = true;

                const imgSession = await ort.InferenceSession.create(
                    "https://huggingface.co/rocca/openai-clip-js/resolve/main/clip-image-vit-32-float32.onnx"
                );
                const txtSession = await ort.InferenceSession.create(
                    "https://huggingface.co/rocca/openai-clip-js/resolve/main/clip-text-vit-32-float32-int32.onnx"
                );

                models.imgSession = imgSession;
                models.txtSession = txtSession;

                document.getElementById('spinner').style.display = 'none';
                document.getElementById('statusText').textContent = '🚀 Models loaded';
            } catch (error) {
                console.error(error);
                document.getElementById('statusText').textContent = '❌ Model loading failed';
            }
        }

        let currentImageSrc = "";
        let currentScale = 1;
        
        function openViewer(src) {
            currentImageSrc = src;
            currentScale = 1;
            const img = document.getElementById("viewerImg");
            img.src = src;
            img.style.transform = "scale(1)";
            document.getElementById("imageViewer").style.display = "block";
        }
        
        function closeViewer() {
            currentScale = 1;
            document.getElementById("imageViewer").style.display = "none";
        }
        
        function zoomIn() {
            currentScale += 0.2;
            if (currentScale > 3) currentScale = 3;
            document.getElementById("viewerImg").style.transform = `scale(${currentScale})`;
        }
        
        function zoomOut() {
            currentScale -= 0.2;
            if (currentScale < 0.5) currentScale = 0.5;
            document.getElementById("viewerImg").style.transform = `scale(${currentScale})`;
        }
        
        function downloadImage() {
            const a = document.createElement("a");
            a.href = currentImageSrc;
            a.download = "searchly_image_" + Date.now() + ".jpg";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
        
        async function shareImage() {
            if (!navigator.share) {
                alert("Sharing is not supported on this device/browser.");
                return;
            }
            
            try {
                const response = await fetch(currentImageSrc);
                const blob = await response.blob();
                const file = new File([blob], "searchly_image.jpg", { type: blob.type });
                
                await navigator.share({
                    files: [file],
                    title: "Photo from Searchly AI",
                    text: "Check out this photo I found!"
                });
            } catch (error) {
                if (error.name !== 'AbortError') {
                    console.error("Share failed:", error);
                    alert("Failed to share image. Try downloading instead.");
                }
            }
        }

        window.addEventListener('load', initModels);
    </script>
</body>
